<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigasi SIHIR - Abdillah</title>
    <!-- Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        /* Efek Transisi Text Mengecil dan Naik ke Atas */
        .bot-text-container {
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .text-huge {
            font-size: 1.875rem; /* 30px */
            line-height: 2.25rem;
            text-align: center;
            margin-top: 15vh;
        }
        @media (min-width: 768px) {
            .text-huge {
                font-size: 3rem; /* 48px */
                line-height: 1;
            }
        }
        .text-small {
            font-size: 1.25rem; /* 20px */
            line-height: 1.75rem;
            text-align: left;
            margin-top: 0;
        }
        /* Cursor Typing */
        .cursor::after {
            content: '_';
            animation: blink 0.7s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        theme: {
                            // Kombinasi Deep Slate Blue & Teal Pastel yang adem
                            lightBg: '#f4f7f6',
                            darkBg: '#0b1319',
                            lightCard: '#ffffff',
                            darkCard: '#131f27',
                            accent: '#14b8a6', // Teal
                            accentHover: '#0d9488'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-theme-lightBg text-slate-800 dark:bg-theme-darkBg dark:text-slate-200 min-h-screen flex flex-col justify-between p-4 md:p-6">

    <!-- TOP BAR (Toggle Dark Mode) -->
    <header class="w-full max-w-4xl mx-auto flex justify-end">
        <button id="themeToggle" class="p-3 rounded-xl bg-slate-200/80 dark:bg-slate-800/80 hover:scale-105 transition-transform duration-200 shadow-sm">
            <!-- Sun Icon -->
            <svg id="sunIcon" class="w-5 h-5 text-amber-500 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14.25 12a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"></path></svg>
            <!-- Moon Icon -->
            <svg id="moonIcon" class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"></path></svg>
        </button>
    </header>

    <!-- CONTENT WRAPPER -->
    <!-- KODE BARU (Lebih lega ke samping) -->
<main class="w-full max-w-xl mx-auto flex-grow flex flex-col justify-center px-6 md:px-8">
        
        <!-- CONTAINER TEXT (Bisa Gede/Kecil & Naik ke Atas) -->
        <div id="textWrapper" class="bot-text-container text-huge mb-8">
            <h1 id="botText" class="font-bold tracking-tight text-slate-900 dark:text-white cursor"></h1>
        </div>

        <!-- CONTAINER PILIHAN JAWABAN -->
        <div id="optionsContainer" class="space-y-3 opacity-0 transition-opacity duration-500 pointer-events-none">
            <!-- Pilihan tombol di-inject lewat JS -->
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="w-full text-center text-xs text-slate-400 dark:text-slate-600 font-medium pt-8">
        bedil.P © 2026 • Nv Flow • <a href="#" onclick="window.location.reload(); return false;" style="color: tomato;">Refresh Halaman</a>
    </footer>

    <!-- LOGIC SYSTEM -->
    <script>
        const flow = {
            greetings: {
                text: "Assalamualaikum bro, apa kabar?",
                options: [
                    { text: "Alhamdulillah Sehaatt..", next: "sehat" },
                    { text: "Lagi males nih", next: "males" },
                    { text: "Lagi sakit", next: "sakit" },
                    { text: "Lagi bete", next: "bete" }
                ]
            },
            sehat: {
                text: "Ada yang bisa gw bantu hari ini?",
                options: [
                    { text: "Gw mau cari sesuatu", url: "https://www.google.com" },
                    { text: "Gw lagi butuh motivasi", url: "https://www.pentil.com" },
                    { text: "Gw lagi iri ngeliat orang lain", url: "/mindset99" }
                ]
            },
            males: {
                text: "Males kenapa bro?",
                options: [
                    { text: "Males hidup", url: "/logika" },
                    { text: "Males berjuang endless tanpa hasil", url: "/katalog-hadiah" },
                    { text: "Males nahan syahwat lagi", url: "/katalog-hadiah" }
                ]
            },
            sakit: {
                text: "Sakit apa bro?",
                options: [
                    { text: "Sakit hati", url: "/mindset99" },
                    { text: "Sakit Fisik", next: "sakitFisik" }
                ]
            },
            sakitFisik: {
                text: "Semoga lekas sembuh yaa... semangat!",
                options: [],
                action: () => {
                    setTimeout(() => {
                        window.location.href = "https://www.google.com";
                    }, 2000);
                }
            },
            bete: {
                text: "Bete kenapa bro?",
                options: [
                    { text: "Iri ngeliat orang lain", url: "/mindset99" },
                    { text: "Capek berjuang dan lagi galau aja", url: "/katalog-hadiah" },
                    { text: "Allah itu beneran ada?", url: "/logika" }
                ]
            }
        };

        let typingTimeout;

        function typeWriter(text, elementId, speed = 40, callback) {
            const element = document.getElementById(elementId);
            element.innerHTML = "";
            element.classList.add('cursor');
            let i = 0;

            clearTimeout(typingTimeout);

            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    typingTimeout = setTimeout(type, speed);
                } else {
                    element.classList.remove('cursor');
                    if (callback) callback();
                }
            }
            type();
        }

        function renderStep(stepKey, isFirstStep = false) {
            const currentData = flow[stepKey];
            const textWrapper = document.getElementById('textWrapper');
            const optionsContainer = document.getElementById('optionsContainer');

            // Sembunyikan opsi & kembalikan posisi text jadi gede di tengah kalau step baru
            optionsContainer.classList.add('opacity-0', 'pointer-events-none');
            if (!isFirstStep) {
                textWrapper.classList.remove('text-small');
                textWrapper.classList.add('text-huge');
            }

            // Ketik text gedenya
            typeWriter(currentData.text, 'botText', 35, () => {
                
                // Setelah selesai ngetik, kecilkan text dan naikkan ke atas
                setTimeout(() => {
                    textWrapper.classList.remove('text-huge');
                    textWrapper.classList.add('text-small');

                    // Setelah animasi naik selesai (600ms), munculkan opsi-opsinya
                    setTimeout(() => {
                        optionsContainer.innerHTML = "";
                        
                        currentData.options.forEach(opt => {
                            const btn = document.createElement('button');
                            btn.className = "w-full text-left p-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-theme-darkCard hover:bg-teal-50 dark:hover:bg-teal-950/20 hover:border-teal-400 dark:hover:border-teal-600 transition-all duration-200 font-medium text-sm md:text-base shadow-sm flex justify-between items-center group transform hover:-translate-y-0.5";
                            
                            btn.innerHTML = `
                                <span>${opt.text}</span>
                                <span class="text-theme-accent transform translate-x-2 opacity-0 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-200">➔</span>
                            `;
                            
                            btn.onclick = () => {
                                if (opt.url) {
                                    window.location.href = opt.url;
                                } else if (opt.next) {
                                    renderStep(opt.next);
                                }
                            };
                            optionsContainer.appendChild(btn);
                        });

                        // Tampilkan kontainer pilihan
                        optionsContainer.classList.remove('opacity-0', 'pointer-events-none');

                        if (currentData.action) {
                            currentData.action();
                        }
                    }, 400);

                }, 500); // Jeda setengah detik sebelum mengecil & naik
            });
        }

        // --- MUKADDIMAH aslinya render step buka 700, tapi 1500---
        window.addEventListener('DOMContentLoaded', () => {
            typeWriter("Selamat datang di situsnya Abdillah!", 'botText', 40, () => {
                setTimeout(() => {
                    renderStep('greetings', true);
                }, 700);
            });
        });

        // --- THEME TOGGLE LOGIC ---
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
        }

        themeToggle.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
